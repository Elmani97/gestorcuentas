name: Compilar APK Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      - name: Extraer archivos
        run: unzip -o app_source.zip

      - name: Instalar Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Aceptar Licencias Android
        run: yes | flutter doctor --android-licenses || true

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar Librerías
        run: |
          pip install -r requirements.txt

      - name: Compilar APK
        run: |
          flet build apk --module-name main_movil -vv
        env:
          FLUTTER_SUPPRESS_ANALYTICS: "true"

      - name: Subir APK Terminado
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: GestorSuscripciones-APK
          path: build/apk/*.apk
